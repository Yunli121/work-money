<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>薪資即時計算</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #e0f2fe; /* 奶藍色背景 */
            --card-bg: #ffffff;
            --border: #000000;
            --plus-bg: #f0fdf4;
            --minus-bg: #fef2f2;
            --final-panel-bg: #ccfbf1; /* 換成清爽的薄荷綠 */
            --final-text: #134e4a;    /* 深綠色文字，避免刺眼 */
        }

        * { 
            box-sizing: border-box; 
            font-family: 'Montserrat', 'Noto Sans TC', sans-serif;
            -webkit-tap-highlight-color: transparent; 
        }

        body { background-color: var(--bg-color); padding: 20px; margin: 0; }
        
        .app-container {
            max-width: 500px;
            margin: 0 auto;
            background: var(--card-bg);
            border: 3px solid var(--border);
            box-shadow: 8px 8px 0px var(--border);
            padding: 20px;
        }

        h2 { 
            font-weight: 900; 
            border-bottom: 4px solid var(--border); 
            padding-bottom: 10px; 
            margin-top: 0;
            color: #0369a1; /* 深藍標題 */
        }

        section {
            margin-bottom: 20px;
            padding: 15px;
            border: 2px solid var(--border);
            box-shadow: 4px 4px 0px var(--border);
        }

        .plus-section { background-color: var(--plus-bg); }
        .minus-section { background-color: var(--minus-bg); }

        .section-title { font-weight: 900; margin-bottom: 12px; display: block; }

        .input-item { margin-bottom: 12px; }
        label { display: block; font-size: 0.85rem; font-weight: 700; margin-bottom: 5px; }
        
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border);
            font-size: 20px; 
            font-weight: 700;
            outline: none;
            background: white;
            border-radius: 0;
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

        .summary-box {
            background: #fff;
            border: 2px solid var(--border);
            padding: 10px;
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
            font-weight: 700;
        }

        /* 這裡改掉黑色了！ */
        .final-result-box {
            margin-top: 25px;
            padding: 20px;
            background: var(--final-panel-bg);
            color: var(--final-text);
            text-align: center;
            border: 3px solid var(--border);
            box-shadow: 6px 6px 0px var(--border);
        }

        .final-label { font-size: 1rem; margin-bottom: 5px; display: block; font-weight: 700; }
        .final-amount { 
            font-size: 2.8rem; 
            font-weight: 900; 
            color: #0d9488; /* 漂亮的深青色 */
        }
    </style>
</head>
<body>

<div class="app-container">
    <h2>薪資詳細計算</h2>

    <section class="plus-section">
        <span class="section-title">➕ 應發項目</span>
        <div class="input-item">
            <label>本薪</label>
            <input type="number" class="salary-input plus" id="baseSalary" value="0" onfocus="clearZero(this)" oninput="updateAll()">
        </div>
        <div class="input-item">
            <label>伙食津貼</label>
            <input type="number" class="salary-input plus" id="foodAllowance" value="0" onfocus="clearZero(this)" oninput="updateAll()">
        </div>
        <div class="input-item">
            <label>節慶/其他獎金</label>
            <input type="number" class="salary-input plus" id="bonus" value="0" onfocus="clearZero(this)" oninput="updateAll()">
        </div>
        <div class="summary-box">
            <span>應發合計</span>
            <span id="totalPlus">$0</span>
        </div>
    </section>

    <section class="minus-section">
        <span class="section-title">➖ 應扣項目</span>
        <div class="input-item">
            <label>遲到扣薪</label>
            <input type="number" class="salary-input minus" id="lateDeduction" value="0" onfocus="clearZero(this)" oninput="updateAll()">
        </div>
        <div class="input-item">
            <label>病假/生理假扣薪</label>
            <input type="number" class="salary-input minus" id="leaveDeduction" value="0" onfocus="clearZero(this)" oninput="updateAll()">
        </div>
        <div class="input-item">
            <label>勞保費</label>
            <input type="number" class="salary-input minus" id="laborIns" value="0" onfocus="clearZero(this)" oninput="updateAll()">
        </div>
        <div class="input-item">
            <label>健保費</label>
            <input type="number" class="salary-input minus" id="healthIns" value="0" onfocus="clearZero(this)" oninput="updateAll()">
        </div>
        <div class="summary-box">
            <span>應扣合計</span>
            <span id="totalMinus">$0</span>
        </div>
    </section>

    <div class="final-result-box">
        <span class="final-label">實發總額</span>
        <span class="final-amount" id="finalNet">$0</span>
    </div>
</div>

<script>
    window.onload = function() {
        const savedData = JSON.parse(localStorage.getItem('salaryData'));
        if (savedData) {
            Object.keys(savedData).forEach(id => {
                const input = document.getElementById(id);
                if (input) input.value = savedData[id];
            });
        }
        updateAll();
    };

    function clearZero(input) {
        if (input.value === "0") {
            input.value = "";
        }
    }

    function updateAll() {
        let currentData = {};
        
        const plusInputs = document.querySelectorAll('.plus');
        let sumPlus = 0;
        plusInputs.forEach(input => {
            let val = parseFloat(input.value) || 0;
            sumPlus += val;
            currentData[input.id] = input.value;
        });
        document.getElementById('totalPlus').innerText = `$${sumPlus.toLocaleString()}`;

        const minusInputs = document.querySelectorAll('.minus');
        let sumMinus = 0;
        minusInputs.forEach(input => {
            let val = parseFloat(input.value) || 0;
            sumMinus += val;
            currentData[input.id] = input.value;
        });
        document.getElementById('totalMinus').innerText = `$${sumMinus.toLocaleString()}`;

        const final = sumPlus - sumMinus;
        document.getElementById('finalNet').innerText = `$${final.toLocaleString()}`;

        localStorage.setItem('salaryData', JSON.stringify(currentData));
    }
</script>

</body>
</html>
